<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Florería Valentina | Arreglos Florales en CDMX — Bodas, Eventos y Regalos</title>
    <meta name="description" content="Arreglos florales artesanales en Ciudad de México. Ramos de novia, centros de mesa, flores para eventos, cumpleaños y más. Entrega el mismo día. ¡Pide por WhatsApp!" />
    <meta name="keywords" content="florería CDMX, arreglos florales, ramos de novia, flores para bodas, centros de mesa, flores a domicilio, floristería Ciudad de México, ramos de flores" />
    <meta name="author" content="Florería Valentina" />
    <link rel="canonical" href="https://floreriavalentina.mx/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://floreriavalentina.mx/" />
    <meta property="og:title" content="Florería Valentina | Arreglos Florales en CDMX" />
    <meta property="og:description" content="Arreglos florales artesanales para bodas, eventos y regalos. Entrega el mismo día en CDMX. Diseños personalizados con flores frescas de temporada." />
    <meta property="og:image" content="/og-image.jpg" />
    <meta property="og:locale" content="es_MX" />
    <meta property="og:site_name" content="Florería Valentina" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Florería Valentina | Arreglos Florales en CDMX" />
    <meta name="twitter:description" content="Arreglos florales artesanales para bodas, eventos y regalos. Entrega el mismo día en CDMX." />
    <meta name="twitter:image" content="/og-image.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#be185d" />

    <!-- Fonts: Preconnect + non-blocking load -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      crossorigin
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" />
    </noscript>

    <!-- Structured Data: LocalBusiness -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Florist",
      "name": "Florería Valentina",
      "description": "Florería artesanal en Ciudad de México especializada en arreglos florales para bodas, eventos, regalos y decoración.",
      "url": "https://floreriavalentina.mx",
      "telephone": "+52-55-1234-5678",
      "email": "pedidos@floreriavalentina.mx",
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Ciudad de México",
        "addressRegion": "CDMX",
        "addressCountry": "MX"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "08:00",
          "closes": "19:00"
        }
      ],
      "priceRange": "$$",
      "sameAs": [
        "https://www.instagram.com/floreriavalentina",
        "https://www.facebook.com/floreriavalentina"
      ]
    }
    </script>

    <!-- Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Hacen entrega el mismo día?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, los pedidos realizados antes de las 2 pm se entregan el mismo día en toda la Ciudad de México."
          }
        },
        {
          "@type": "Question",
          "name": "¿Hacen arreglos personalizados para bodas?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí, diseñamos ramos de novia, centros de mesa y decoraciones florales completamente personalizadas para bodas. Contáctanos para una consulta sin costo."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo puedo hacer un pedido?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes hacer tu pedido directamente por WhatsApp al +52 55 1234 5678, llenando el formulario de contacto en nuestra página o enviando un correo a pedidos@floreriavalentina.mx."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
